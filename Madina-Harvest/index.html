    <style>
        
:root {
    --primary: #1e5631;
    --primary-dark: #143d22;
    --primary-light: #2a7a4a;
    --accent: #c68642;
    --accent-dark: #a06530;
    --bg: #faf8f5;
    --bg-dark: #f0ece6;
    --text: #1a1a1a;
    --text-light: #5c5c5c;
    --white: #ffffff;
    --shadow: 0 8px 32px rgba(30,86,49,0.08);
    --shadow-lg: 0 20px 60px rgba(30,86,49,0.12);
    --radius: 20px;
    --radius-sm: 12px;
    --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 80px; }
body {
    font-family: 'Poppins', 'Noto Sans Bengali', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    overflow-x: hidden;
}
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }
header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.04);
    transition: var(--transition);
}
header.scrolled { box-shadow: var(--shadow); }
.header-container {
    max-width: 1280px; margin: 0 auto; padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between; height: 76px;
}
.logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
.logo-icon {
    width: 50px; height: 50px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    color: white; font-size: 22px; box-shadow: 0 4px 16px rgba(30,86,49,0.25);
}
.logo-text { font-size: 1.5rem; font-weight: 700; color: var(--primary-dark); letter-spacing: -0.5px; }
.logo-text span { color: var(--accent); }
nav { display: flex; align-items: center; gap: 32px; }
.nav-links { display: flex; gap: 32px; list-style: none; }
.nav-links a {
    text-decoration: none; color: var(--text); font-weight: 500; font-size: 0.95rem;
    position: relative; padding: 4px 0; transition: var(--transition);
}
.nav-links a::after {
    content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2.5px;
    background: var(--accent); transition: var(--transition); border-radius: 2px;
}
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
.nav-links a:hover { color: var(--primary); }
.lang-toggle {
    display: flex; align-items: center; gap: 8px; background: var(--bg-dark);
    padding: 8px 16px; border-radius: 24px; cursor: pointer; border: 2px solid transparent;
    transition: var(--transition); font-weight: 600; font-size: 0.85rem;
}
.lang-toggle:hover { border-color: var(--primary-light); background: var(--white); }
.lang-toggle i { color: var(--primary); }
.mobile-menu-btn { display: none; background: none; border: none; font-size: 1.5rem; color: var(--primary-dark); cursor: pointer; }
footer { background: var(--primary-dark); color: white; padding: 70px 24px 30px; }
.footer-container { max-width: 1280px; margin: 0 auto; }
.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 48px; }
.footer-brand .logo-text { color: white; font-size: 1.6rem; margin-bottom: 18px; display: block; }
.footer-brand .logo-text span { color: var(--accent); }
.footer-brand p { opacity: 0.85; font-size: 0.95rem; line-height: 1.8; }
.footer-col h4 { font-size: 1.15rem; margin-bottom: 22px; color: var(--accent); font-weight: 600; }
.footer-col ul { list-style: none; }
.footer-col ul li { margin-bottom: 12px; }
.footer-col ul li a { color: rgba(255,255,255,0.85); text-decoration: none; transition: var(--transition); font-size: 0.95rem; }
.footer-col ul li a:hover { color: var(--accent); padding-left: 4px; }
.footer-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 28px; text-align: center; opacity: 0.7; font-size: 0.9rem; }
.btn {
    padding: 16px 36px; border-radius: 50px; font-weight: 600; font-size: 1rem;
    text-decoration: none; display: inline-flex; align-items: center; gap: 12px;
    transition: var(--transition); cursor: pointer; border: none; font-family: inherit;
}
.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white; box-shadow: 0 6px 24px rgba(30,86,49,0.3);
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(30,86,49,0.4); }
.btn-outline { background: transparent; color: var(--primary); border: 2.5px solid var(--primary); }
.btn-outline:hover { background: var(--primary); color: white; transform: translateY(-3px); }
.btn-accent {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: white; box-shadow: 0 6px 24px rgba(198,134,66,0.3);
}
.btn-accent:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(198,134,66,0.4); }
.section-container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
.section-header { text-align: center; margin-bottom: 64px; }
.section-tag {
    display: inline-block; background: rgba(30,86,49,0.08); color: var(--primary);
    padding: 8px 20px; border-radius: 30px; font-size: 0.85rem; font-weight: 600;
    margin-bottom: 18px; letter-spacing: 0.5px; text-transform: uppercase;
}
.section-header h2 { font-size: 2.6rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 16px; }
.section-header p { color: var(--text-light); font-size: 1.15rem; max-width: 600px; margin: 0 auto; }
.fade-in { opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }
.loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--white); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease; }
.loader.hidden { opacity: 0; visibility: hidden; }
.loader-spinner { width: 56px; height: 56px; border: 4px solid var(--bg-dark); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 30px; right: 30px; background: var(--primary-dark); color: white; padding: 18px 28px; border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); transform: translateY(120px); opacity: 0; transition: var(--transition); z-index: 9998; font-weight: 500; }
.toast.show { transform: translateY(0); opacity: 1; }
@media (max-width: 992px) {
    .footer-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
    .nav-links { display: none; }
    .mobile-menu-btn { display: block; }
    .footer-grid { grid-template-columns: 1fr; text-align: center; }
    .section-header h2 { font-size: 2rem; }
}


        /* Redesigned Hero */
        .hero {
            min-height: 100vh; display: flex; align-items: center; padding: 140px 32px 100px;
            background: linear-gradient(135deg, #f7f2ea 0%, #eef4f0 40%, #f5efe6 100%);
            position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; top: -10%; right: -5%; width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(30,86,49,0.06) 0%, transparent 70%); border-radius: 50%;
        }
        .hero::after {
            content: ''; position: absolute; bottom: -20%; left: -5%; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(198,134,66,0.08) 0%, transparent 70%); border-radius: 50%;
        }
        .hero-container {
            max-width: 1280px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.1fr;
            gap: 80px; align-items: center; position: relative; z-index: 1;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(30,86,49,0.08); color: var(--primary);
            padding: 10px 20px; border-radius: 50px; font-size: 0.9rem; font-weight: 600;
            margin-bottom: 28px; border: 1px solid rgba(30,86,49,0.12);
        }
        .hero-badge i {
            width: 28px; height: 28px; background: var(--primary); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
        }
        .hero-content h1 {
            font-size: 3.6rem; font-weight: 800; color: var(--primary-dark); line-height: 1.15;
            margin-bottom: 24px; letter-spacing: -1.5px;
        }
        .hero-content h1 .highlight {
            color: var(--accent-dark); position: relative; display: inline;
            background: linear-gradient(120deg, rgba(198,134,66,0.2) 0%, rgba(198,134,66,0.2) 100%);
            background-repeat: no-repeat; background-size: 100% 40%; background-position: 0 88%;
            padding: 0 8px; margin: 0 -8px;
        }
        .hero-content p {
            font-size: 1.2rem; color: var(--text-light); margin-bottom: 36px; max-width: 520px; line-height: 1.8;
        }
        .hero-stats {
            display: flex; gap: 0; margin-bottom: 40px;
            background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
            padding: 24px 32px; max-width: 480px;
        }
        .stat-item {
            text-align: center; flex: 1; padding: 0 16px;
            border-right: 1px solid var(--bg-dark);
        }
        .stat-item:last-child { border-right: none; }
        .stat-number {
            font-size: 1.9rem; font-weight: 800; color: var(--primary); display: block; line-height: 1;
        }
        .stat-label {
            font-size: 0.8rem; color: var(--text-light); font-weight: 500; margin-top: 6px; display: block;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .hero-btns { display: flex; gap: 18px; }

        .hero-images {
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        .hero-images::before {
            content: ''; position: absolute; width: 110%; height: 110%;
            background: linear-gradient(135deg, rgba(30,86,49,0.08), rgba(198,134,66,0.08));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; z-index: -1; animation: blob 8s ease-in-out infinite;
        }
        @keyframes blob {
            0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: rotate(0deg); }
            50% { border-radius: 58% 42% 36% 64% / 48% 62% 38% 52%; transform: rotate(3deg); }
        }
        .hero-img-main {
            width: 100%; border-radius: var(--radius); box-shadow: var(--shadow-lg);
            object-fit: cover; height: 480px; transition: var(--transition); border: 6px solid white;
        }
        .hero-img-main:hover { transform: scale(1.03) rotate(1deg); }
        .hero-float-card {
            position: absolute; bottom: 30px; left: -30px; background: white;
            padding: 20px 28px; border-radius: var(--radius); box-shadow: var(--shadow-lg);
            display: flex; align-items: center; gap: 16px; animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .float-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.3rem;
        }
        .float-text { font-size: 0.9rem; }
        .float-text strong { display: block; font-size: 1.2rem; color: var(--primary-dark); }

        /* Products Section */
        .products { background: linear-gradient(180deg, var(--bg) 0%, var(--white) 100%); padding: 100px 24px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 32px; }
        .product-card {
            background: var(--white); border-radius: var(--radius); overflow: hidden;
            box-shadow: var(--shadow); transition: var(--transition); border: 1px solid rgba(0,0,0,0.03);
            text-decoration: none; color: inherit; display: block;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-lg); }
        .product-img-wrap { overflow: hidden; position: relative; height: 240px; }
        .product-img {
            width: 100%; height: 100%; object-fit: cover; transition: var(--transition);
        }
        .product-card:hover .product-img { transform: scale(1.08); }
        .product-body { padding: 28px; }
        .product-badge {
            display: inline-block; background: rgba(30,86,49,0.08); color: var(--primary);
            padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
            margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .product-body h3 { font-size: 1.35rem; color: var(--primary-dark); margin-bottom: 12px; font-weight: 700; }
        .product-body p { color: var(--text-light); font-size: 0.95rem; margin-bottom: 18px; line-height: 1.7; }
        .product-price {
            font-size: 1.4rem; font-weight: 800; color: var(--accent-dark); margin-bottom: 20px;
            display: flex; align-items: baseline; gap: 6px;
        }
        .product-price span { font-size: 0.9rem; color: var(--text-light); font-weight: 500; }
        .product-btn {
            width: 100%; padding: 14px; background: var(--primary); color: white; border: none;
            border-radius: var(--radius-sm); font-weight: 700; cursor: pointer;
            transition: var(--transition); font-family: inherit; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .product-btn:hover { background: var(--primary-dark); }

        /* Other Sections */
        .about { background: var(--white); padding: 100px 24px; }
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 70px; align-items: center; }
        .about-images { position: relative; }
        .about-img {
            width: 100%; border-radius: var(--radius); box-shadow: var(--shadow);
            object-fit: cover; height: 420px;
        }
        .about-img-secondary {
            position: absolute; bottom: -30px; right: -30px; width: 220px; height: 220px;
            border-radius: var(--radius); box-shadow: var(--shadow-lg); border: 5px solid white;
            object-fit: cover;
        }
        .about-content h3 { font-size: 2.2rem; color: var(--primary-dark); margin-bottom: 24px; font-weight: 700; }
        .about-content p { color: var(--text-light); margin-bottom: 20px; font-size: 1.05rem; line-height: 1.8; }
        .about-features { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 32px; }
        .about-feature {
            display: flex; align-items: center; gap: 12px; padding: 14px 18px;
            background: var(--bg); border-radius: var(--radius-sm); transition: var(--transition);
        }
        .about-feature:hover { background: rgba(30,86,49,0.06); transform: translateX(6px); }
        .about-feature i { color: var(--primary); font-size: 1.2rem; }
        .about-feature span { font-weight: 600; font-size: 0.95rem; }

        .features { background: var(--white); padding: 100px 24px; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 32px; }
        .feature-card {
            background: var(--bg); padding: 44px 32px; border-radius: var(--radius);
            text-align: center; transition: var(--transition); border: 1px solid rgba(0,0,0,0.02);
        }
        .feature-card:hover { background: var(--white); box-shadow: var(--shadow); transform: translateY(-6px); }
        .feature-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; color: white; font-size: 1.6rem;
            box-shadow: 0 12px 28px rgba(30,86,49,0.2);
        }
        .feature-card h3 { font-size: 1.25rem; color: var(--primary-dark); margin-bottom: 14px; font-weight: 700; }
        .feature-card p { color: var(--text-light); font-size: 0.95rem; line-height: 1.7; }

        .gallery { background: linear-gradient(180deg, var(--white) 0%, var(--bg) 100%); padding: 100px 24px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }

            position: relative; border-radius: var(--radius); overflow: hidden;

            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(20,61,34,0.85));

        .gallery-overlay h4 { font-size: 1.2rem; margin-bottom: 6px; font-weight: 700; }
        .gallery-overlay p { font-size: 0.9rem; opacity: 0.9; }

        .location { background: var(--white); padding: 100px 24px; }

        .location-info h3 { font-size: 2rem; color: var(--primary-dark); margin-bottom: 20px; font-weight: 700; }
        .location-info p { color: var(--text-light); margin-bottom: 28px; font-size: 1.05rem; line-height: 1.8; }

        .map-container { border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-lg); height: 420px; }

        .payment-card p { font-size: 0.95rem; opacity: 0.9; margin-bottom: 0; }

        }
        .contact-link div strong { display: block; color: var(--primary-dark); margin-bottom: 4px; font-weight: 600; }
        .contact-link div span { font-size: 0.9rem; color: var(--text-light); }
        .contact-form {
            background: var(--white); padding: 44px; border-radius: var(--radius); box-shadow: var(--shadow);

        .form-group { margin-bottom: 24px; }

            width: 100%; padding: 16px 20px; border: 2px solid var(--bg-dark);
            border-radius: var(--radius-sm); font-family: inherit; font-size: 1rem;
